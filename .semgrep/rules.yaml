# .semgrep/rules.yaml
# Custom security rules for static analysis

rules:
  - id: detect-hardcoded-api-key
    pattern-regex: '(?i)(AIza[0-9A-Za-z-_]{35})'
    message: "Error: Hardcoded Firebase API credentials detected. Please use environment variables."
    languages:
      - javascript
      - typescript
      - python
    severity: ERROR

  - id: detect-hardcoded-firebase-config
    patterns:
      - pattern-either:
          - pattern: |
              { ..., apiKey: "...", ... }
          - pattern: |
              { ..., projectId: "...", ... }
    message: "Error: Hardcoded Firebase configuration object detected. Use import.meta.env."
    languages:
      - javascript
      - typescript
    severity: ERROR

  - id: prevent-eval-use
    patterns:
      - pattern: eval(...)
    message: "Warning: Do not use eval() as it exposes code to security vulnerabilities."
    languages:
      - javascript
      - typescript
      - python
    severity: WARNING
