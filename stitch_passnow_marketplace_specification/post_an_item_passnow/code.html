<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PassNow - Create Listing</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#171d16",
                        "inverse-on-surface": "#ecf3e7",
                        "on-surface-variant": "#3e4a3d",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#dde5d9",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#a72d51",
                        "on-secondary-container": "#684000",
                        "secondary-fixed": "#ffddb8",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface": "#f4fcf0",
                        "inverse-primary": "#62df7d",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#dde5d9",
                        "tertiary-fixed-dim": "#ffb2bf",
                        "outline-variant": "#bdcaba",
                        "secondary": "#855300",
                        "on-primary-container": "#f7fff2",
                        "primary-fixed": "#7ffc97",
                        "surface-dim": "#d5dcd1",
                        "on-primary-fixed": "#002109",
                        "error-container": "#ffdad6",
                        "surface-container": "#e9f0e5",
                        "on-tertiary-container": "#fffbff",
                        "outline": "#6e7b6c",
                        "on-secondary-fixed": "#2a1700",
                        "secondary-container": "#fea619",
                        "on-primary-fixed-variant": "#005320",
                        "primary-container": "#00873a",
                        "primary": "#006b2c",
                        "background": "#f4fcf0",
                        "on-surface": "#171d16",
                        "surface-bright": "#f4fcf0",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#8a143c",
                        "primary-fixed-dim": "#62df7d",
                        "tertiary-container": "#c74668",
                        "surface-tint": "#006e2d",
                        "secondary-fixed-dim": "#ffb95f",
                        "surface-container-high": "#e3eadf",
                        "surface-container-low": "#eff6ea",
                        "on-tertiary-fixed": "#3f0016",
                        "tertiary-fixed": "#ffd9de",
                        "inverse-surface": "#2b322b",
                        "on-secondary-fixed-variant": "#653e00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "1rem",
                        "stack-xs": "0.25rem",
                        "gutter": "1.5rem",
                        "stack-sm": "0.5rem",
                        "stack-lg": "2rem",
                        "container-max": "1280px",
                        "margin-mobile": "1rem"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-xl": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-xl-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-xl": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-xl-mobile": ["28px", { "lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        [data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md antialiased flex flex-col min-h-screen">
<!-- Main Content Canvas - Suppressed TopNav/BottomNav for Transactional Flow -->
<main class="flex-grow flex items-start justify-center p-gutter md:p-stack-lg bg-surface-container-lowest">
<div class="w-full max-w-3xl bg-surface-container-lowest rounded-2xl shadow-sm border border-outline-variant/30 overflow-hidden">
<!-- Header Area -->
<div class="px-gutter py-stack-md border-b border-outline-variant/30 flex items-center gap-stack-md bg-surface-container-low/50">
<a class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container-high hover:bg-surface-variant transition-colors text-on-surface-variant" href="#">
<span class="material-symbols-outlined" data-icon="close">close</span>
</a>
<div>
<h1 class="text-headline-md font-headline-md text-on-surface">List an Item</h1>
<p class="text-body-sm font-body-sm text-on-surface-variant">Share your unneeded items with the campus community.</p>
</div>
</div>
<!-- Form Canvas -->
<form class="p-gutter md:p-stack-lg flex flex-col gap-stack-lg" id="create-listing-form">
<!-- Section: Photos -->
<section>
<h2 class="text-label-md font-label-md text-on-surface mb-stack-xs">Photos (up to 5) <span class="text-error">*</span></h2>
<div class="grid grid-cols-3 sm:grid-cols-5 gap-stack-sm">
<!-- Upload Trigger -->
<div class="aspect-square border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center gap-stack-xs text-outline hover:border-primary hover:text-primary transition-colors cursor-pointer bg-surface-container-lowest">
<span class="material-symbols-outlined text-headline-lg" data-icon="add_photo_alternate">add_photo_alternate</span>
<span class="text-label-sm font-label-sm">Add Photo</span>
</div>
<!-- Placeholders for structure -->
<div class="aspect-square bg-surface-container-low rounded-xl border border-outline-variant/30 hidden sm:block"></div>
<div class="aspect-square bg-surface-container-low rounded-xl border border-outline-variant/30 hidden sm:block"></div>
<div class="aspect-square bg-surface-container-low rounded-xl border border-outline-variant/30 hidden sm:block"></div>
<div class="aspect-square bg-surface-container-low rounded-xl border border-outline-variant/30 hidden sm:block"></div>
</div>
</section>
<div class="h-px bg-outline-variant/20 w-full"></div>
<!-- Section: Details -->
<section class="flex flex-col gap-stack-md">
<!-- Title -->
<div>
<label class="block text-label-md font-label-md text-on-surface mb-stack-xs" for="title">Title <span class="text-error">*</span></label>
<input class="w-full rounded-lg border-outline-variant bg-surface-container-lowest px-4 py-3 text-body-md font-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-on-surface-variant/50" id="title" maxlength="100" name="title" placeholder="e.g., Biology 101 Textbook, 4th Ed." required="" type="text"/>
<div class="flex justify-between mt-1 px-1">
<span class="text-label-sm font-label-sm text-error hidden" id="title-error">Title is required</span>
<span class="text-label-sm font-label-sm text-on-surface-variant/70 ml-auto">0/100</span>
</div>
</div>
<!-- Category & Condition Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div>
<label class="block text-label-md font-label-md text-on-surface mb-stack-xs" for="category">Category <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full appearance-none rounded-lg border-outline-variant bg-surface-container-lowest px-4 py-3 text-body-md font-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="category" name="category" required="">
<option disabled="" selected="" value="">Select Category</option>
<option value="textbooks">Textbooks</option>
<option value="electronics">Electronics</option>
<option value="furniture">Furniture</option>
<option value="clothing">Clothing</option>
<option value="other">Other</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<div>
<label class="block text-label-md font-label-md text-on-surface mb-stack-xs" for="condition">Condition <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full appearance-none rounded-lg border-outline-variant bg-surface-container-lowest px-4 py-3 text-body-md font-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="condition" name="condition" required="">
<option disabled="" selected="" value="">Select Condition</option>
<option value="new">New</option>
<option value="like-new">Like New</option>
<option value="good">Good</option>
<option value="fair">Fair</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Description -->
<div>
<label class="block text-label-md font-label-md text-on-surface mb-stack-xs" for="description">Description</label>
<textarea class="w-full rounded-lg border-outline-variant bg-surface-container-lowest px-4 py-3 text-body-md font-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-y placeholder:text-on-surface-variant/50" id="description" name="description" placeholder="Describe any wear and tear, history, or reasons for giving it away..." rows="4"></textarea>
</div>
</section>
<div class="h-px bg-outline-variant/20 w-full"></div>
<!-- Section: Pricing -->
<section class="flex flex-col gap-stack-md">
<h2 class="text-label-md font-label-md text-on-surface">Listing Type</h2>
<div class="flex gap-stack-md">
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="listing_type" type="radio" value="sell"/>
<div class="h-full rounded-xl border border-outline-variant p-stack-md flex flex-col gap-stack-xs items-center text-center peer-checked:border-primary peer-checked:bg-primary-container/10 peer-checked:text-primary transition-all">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
<span class="text-label-md font-label-md">Sell Item</span>
</div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="listing_type" type="radio" value="free"/>
<div class="h-full rounded-xl border border-outline-variant p-stack-md flex flex-col gap-stack-xs items-center text-center peer-checked:border-primary peer-checked:bg-primary-container/10 peer-checked:text-primary transition-all">
<span class="material-symbols-outlined" data-icon="volunteer_activism">volunteer_activism</span>
<span class="text-label-md font-label-md">Give Away Free</span>
</div>
</label>
</div>
<div class="transition-all duration-300 overflow-hidden h-[84px] opacity-100 mt-stack-xs" id="price-container">
<label class="block text-label-md font-label-md text-on-surface mb-stack-xs" for="price">Price ($) <span class="text-error">*</span></label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md">$</span>
<input class="w-full md:w-1/2 rounded-lg border-outline-variant bg-surface-container-lowest pl-8 pr-4 py-3 text-body-md font-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="price" min="1" name="price" placeholder="0.00" required="" step="0.50" type="number"/>
</div>
</div>
</section>
<div class="h-px bg-outline-variant/20 w-full"></div>
<!-- Section: Location (Auto-populated) -->
<section>
<h2 class="text-label-md font-label-md text-on-surface mb-stack-xs">Pickup Location</h2>
<div class="flex items-center gap-stack-sm p-4 bg-surface-container rounded-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-primary" data-icon="location_on" data-weight="fill">location_on</span>
<div>
<p class="text-body-md font-body-md text-on-surface">University Campus Center</p>
<p class="text-body-sm font-body-sm text-on-surface-variant">North District</p>
</div>
<button class="ml-auto text-label-sm font-label-sm text-primary hover:underline" type="button">Edit</button>
</div>
</section>
<!-- Actions -->
<div class="pt-stack-md flex gap-stack-md items-center justify-end">
<button class="px-6 py-3 rounded-lg text-label-md font-label-md text-on-surface-variant hover:bg-surface-variant transition-colors" type="button">Save Draft</button>
<button class="px-8 py-3 rounded-lg text-label-md font-label-md bg-primary text-on-primary hover:bg-surface-tint shadow-sm hover:shadow-md transition-all active:scale-95" type="submit">Post Listing</button>
</div>
</form>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('create-listing-form');
            const typeRadios = document.querySelectorAll('input[name="listing_type"]');
            const priceContainer = document.getElementById('price-container');
            const priceInput = document.getElementById('price');
            const titleInput = document.getElementById('title');
            const titleError = document.getElementById('title-error');

            // Handle Listing Type Toggle
            typeRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (e.target.value === 'free') {
                        priceContainer.style.height = '0px';
                        priceContainer.style.opacity = '0';
                        priceInput.disabled = true;
                        priceInput.required = false;
                        priceInput.value = '';
                    } else {
                        priceContainer.style.height = '84px';
                        priceContainer.style.opacity = '1';
                        priceInput.disabled = false;
                        priceInput.required = true;
                    }
                });
            });

            // Basic Validation Visual Feedback Example
            titleInput.addEventListener('blur', () => {
                if (!titleInput.value.trim()) {
                    titleInput.classList.add('border-error', 'focus:border-error', 'focus:ring-error');
                    titleInput.classList.remove('focus:border-primary', 'focus:ring-primary');
                    titleError.classList.remove('hidden');
                } else {
                    titleInput.classList.remove('border-error', 'focus:border-error', 'focus:ring-error');
                    titleInput.classList.add('focus:border-primary', 'focus:ring-primary');
                    titleError.classList.add('hidden');
                }
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                // Check basic validity
                if (form.checkValidity()) {
                    // Simulate processing
                    const btn = form.querySelector('button[type="submit"]');
                    const originalText = btn.innerText;
                    btn.innerText = 'Posting...';
                    btn.disabled = true;
                    btn.classList.add('opacity-80');
                    
                    setTimeout(() => {
                        btn.innerText = 'Success!';
                        btn.classList.remove('bg-primary', 'hover:bg-surface-tint');
                        btn.classList.add('bg-primary-container', 'text-on-primary-container');
                        
                        setTimeout(() => {
                            btn.innerText = originalText;
                            btn.disabled = false;
                            btn.classList.remove('opacity-80', 'bg-primary-container', 'text-on-primary-container');
                            btn.classList.add('bg-primary', 'hover:bg-surface-tint');
                        }, 2000);
                    }, 1000);
                } else {
                    // Force display of validation messages (browser default or custom)
                    form.reportValidity();
                }
            });
        });
    </script>
</body></html>
